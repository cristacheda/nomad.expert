  </head>

<body class="page-home">
  <header>
    <div class="container">
      <div class="row">   
        <div class="col-md-4 col-12 branding-column">
          <div class="h1" id="logo"><a href="index.html">Nomad.expert</a></div>
          <button id="toggle-menu"><i class="fal fa-bars"></i></button>
        </div>
        <div class="col-md-8 col-12 navigation-column">
          <nav>
            <ul> 
              <li><a href="index.html"><i class="fal fa-home"></i> Acasă</a></li>
              <li><a href="project.html"><i class="fal fa-info-circle"></i> Despre</a></li>
              <li><a href="team.html"><i class="fal fa-users"></i> Echipa</a></li>
              <li><a href="mailto:hello@nomad.expert"><i class="fal fa-envelope"></i> Contact</a></li>
            </ul>
          </nav>
        </div>
      </div>
    </div>
  </header>
  <main>
    <div class="container">
      <h1 class="text-center">Buletin? Pașaport? Viză? Acum știi.</h1>
      <div id="form-container">
        <div class="row">
          <div class="col-md-6 col-12">
            <label for="origin-country-selector">Din ce țară călătorești?</label>
            <select id="origin-country-selector"></select>
          </div>
          <div class="col-md-6 col-12" id="destination-country-selector-column">
            <label for="destination-country-selector">și în ce țară vrei să ajungi?</label>
            <select id="destination-country-selector" disabled="true">
              <option value="">Selectează o țară</option>
            </select>
          </div>
          <div class="col-12">
            <div id="result">
              <p id="info"></p>
              <p class="blockquote" id="comment"></p>
              <p class="blockquote" id="warning"></p>
              <p id="source"></p>
              <p id="edit"></p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</body>
